<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>림버스 카드게임 덱 빌더</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <!-- =========================
         PAGE 1 : 수감자 / 인격 선택
    ========================== -->
    <main id="pageSelect" class="page active">
      <section class="page-header">
        <h1>수감자 / 인격 선택</h1>
      </section>

      <section class="select-layout">
        <!-- 좌측 -->
        <div class="select-left-column">
          <div class="panel compact-panel">
            <div class="panel-title">수감자 선택</div>
            <div id="sinnerGrid" class="sinner-grid"></div>
          </div>

          <div class="panel compact-panel">
            <div class="panel-title">인격 선택</div>
            <div id="identityRow" class="identity-row"></div>
          </div>
        </div>

        <!-- 우측 -->
        <div class="panel side-panel large-side-panel">
          <div class="panel-title">선택 상태</div>

          <div class="slot-row large-slot-row">
            <div
              id="frontSlotCard"
              class="slot-card active-slot-card large-slot-card"
              data-position="front"
            >
              <div class="slot-label">전방</div>
              <div id="frontSlotPreview" class="slot-preview large-slot-preview empty">
                선택 필요
              </div>
            </div>

            <div
              id="backSlotCard"
              class="slot-card large-slot-card"
              data-position="back"
            >
              <div class="slot-label">후방</div>
              <div id="backSlotPreview" class="slot-preview large-slot-preview empty">
                선택 필요
              </div>
            </div>
          </div>

          <div class="button-column top-gap">
            <button id="swapBtn" class="ui-btn">전후방 교체</button>
            <button id="goSavePageFromSelectBtn" class="ui-btn">저장목록</button>
          </div>
        </div>
      </section>

      <section class="bottom-actions">
        <button id="resetSelectBtn" class="ui-btn">초기화</button>
        <button id="goBuildPageBtn" class="ui-btn primary-btn">다음</button>
      </section>
    </main>

    <!-- =========================
         PAGE 2 : 덱 만들기
    ========================== -->
    <main id="pageBuild" class="page">
      <section class="build-layout">
        <!-- 좌측 메인 -->
        <div class="build-main">
          <section class="build-top-combined">
            <div class="panel top-identity-summary-panel">
              <div class="panel-title">선택 인격</div>
              <div class="top-identity-summary-row">
                <div id="buildFrontSummary" class="build-summary-card small-summary-card">
                  전방 미선택
                </div>
                <div id="buildBackSummary" class="build-summary-card small-summary-card">
                  후방 미선택
                </div>
              </div>
            </div>

            <div class="panel top-identity-pack-panel">
              <div class="panel-title">인격 고유 카드팩</div>
              <div id="identityPackRow" class="card-grid-row"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-title">수감자 고유 카드팩</div>
            <div id="basePackRow" class="card-grid-row"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              현재 덱
              <span id="deckStatusInline" class="status-text">0 / 20</span>
            </div>
            <div id="deckRow" class="deck-row"></div>
          </section>

          <section class="panel">
            <div class="panel-title">덱 저장</div>
            <div class="save-bar">
              <input
                id="deckNameInput"
                class="deck-name-input"
                type="text"
                maxlength="10"
                placeholder="덱 이름 (최대 10자)"
              />
              <button id="saveDeckBtn" class="ui-btn primary-btn">저장</button>
              <button id="goSavePageFromBuildBtn" class="ui-btn">저장목록</button>
            </div>
            <div id="saveMessage" class="save-message"></div>
          </section>
        </div>

        <!-- 우측 고정 패널 -->
        <aside class="build-side">
          <div class="panel sticky-panel">
            <div class="panel-title">메뉴</div>
            <div class="button-column">
              <button id="backToSelectBtn" class="ui-btn">뒤로가기</button>
              <button id="resetDeckBtn" class="ui-btn">초기화</button>
              <button id="goSavePageFromSideBtn" class="ui-btn">저장목록</button>
            </div>

            <div class="preview-box">
              <div class="preview-title">카드 미리보기</div>
              <div id="hoverPreview" class="hover-preview empty-preview">
                마우스를 올리면 확대됩니다
              </div>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <!-- =========================
         PAGE 3 : 저장 / 불러오기
    ========================== -->
    <main id="pageSave" class="page">
      <section class="save-layout">
        <!-- 좌측 저장 목록 -->
        <div class="panel">
          <div class="panel-title">저장된 덱 목록</div>
          <div id="savedDeckList" class="saved-deck-list"></div>
        </div>

        <!-- 우측 관리 패널 -->
        <aside class="panel save-side-panel">
          <div class="panel-title">관리</div>

          <div class="save-tool-group">
            <div class="tool-title">선택된 덱 이름 바꾸기</div>
            <input
              id="renameInput"
              class="deck-name-input"
              type="text"
              maxlength="10"
              placeholder="새 이름 입력"
            />
            <button id="renameDeckBtn" class="ui-btn">이름 바꾸기</button>
          </div>

          <div class="save-tool-group">
            <div class="tool-title">코드 생성하기</div>
            <button id="generateCodeBtn" class="ui-btn">코드 생성</button>
            <textarea
              id="generatedCodeArea"
              class="code-area"
              readonly
              placeholder="생성된 코드"
            ></textarea>
          </div>

          <div class="save-tool-group">
            <div class="tool-title">코드로 불러오기</div>
            <textarea
              id="loadCodeInput"
              class="code-area"
              placeholder="코드 입력란"
            ></textarea>
            <button id="loadCodeBtn" class="ui-btn">코드로 불러오기</button>
          </div>

          <div class="save-tool-group">
            <button id="goCreateDeckBtn" class="ui-btn primary-btn">덱 만들기</button>
            <button id="deleteDeckBtn" class="ui-btn danger-btn">덱 삭제하기</button>
          </div>

          <div id="savePageMessage" class="save-message"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="data/sinners.js"></script>
  <script src="data/identities.js"></script>
  <script src="data/cards.js"></script>
  <script src="script.js"></script>
</body>
</html>
